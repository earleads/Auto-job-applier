name: Auto Apply to Compliance Jobs

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - test
          - dry-run
      reset:
        description: 'Clear job database before running (re-scrape everything)'
        required: false
        default: false
        type: boolean

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: Restore previous run data
        uses: dawidd6/action-download-artifact@v6
        with:
          name: application-results
          path: data/
          search_artifacts: true
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Run job applier
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
        run: |
          FLAGS=""
          if [ "${{ inputs.mode }}" = "test" ]; then FLAGS="--test"; fi
          if [ "${{ inputs.mode }}" = "dry-run" ]; then FLAGS="--dry-run"; fi
          if [ "${{ inputs.reset }}" = "true" ]; then FLAGS="$FLAGS --reset"; fi
          python main.py $FLAGS

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: application-results
          path: data/
          retention-days: 30
          overwrite: true
